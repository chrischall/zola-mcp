name: Tag & Bump

on:
  workflow_dispatch:

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  cut-and-bump:
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6.0.2
        with:
          token: ${{ secrets.RELEASE_PAT }}

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Tag current version
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          git tag "v${CURRENT}"
          echo "TAGGED_VERSION=${CURRENT}" >> "$GITHUB_ENV"

      - name: Bump patch version
        run: |
          npm version patch --no-git-tag-version
          NEXT=$(node -p "require('./package.json').version")
          echo "NEXT_VERSION=${NEXT}" >> "$GITHUB_ENV"

          sed -i "s/version: '${TAGGED_VERSION}'/version: '${NEXT}'/" src/index.ts

          # All JSON version files (manifest.json, server.json, .claude-plugin/*)
          node -e "
            const fs = require('fs');
            for (const f of ['manifest.json', 'server.json', '.claude-plugin/plugin.json', '.claude-plugin/marketplace.json']) {
              if (!fs.existsSync(f)) continue;
              const o = JSON.parse(fs.readFileSync(f, 'utf8'));
              if (o.version !== undefined) o.version = '${NEXT}';
              if (o.metadata?.version !== undefined) o.metadata.version = '${NEXT}';
              if (Array.isArray(o.packages)) o.packages.forEach(p => { if (p.version !== undefined) p.version = '${NEXT}'; });
              if (Array.isArray(o.plugins)) o.plugins.forEach(p => { if (p.version !== undefined) p.version = '${NEXT}'; });
              fs.writeFileSync(f, JSON.stringify(o, null, 2) + '\n');
            }
          "

      - name: Rebuild
        run: npm run build

      - name: Commit and push
        run: |
          git add -A
          git commit -m "chore: bump version to v${NEXT_VERSION}"
          git push origin main
          git push origin "v${TAGGED_VERSION}"
